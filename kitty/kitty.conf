# ~/code/my-shell-my-rules/kitty/kitty.conf
# Docs: https://sw.kovidgoyal.net/kitty/conf/

# Load Eldritch colorscheme
include themes/eldritch.conf

#############################################################################
#                              Core
#############################################################################

term xterm-kitty
shell zsh --login

# Allow external tools to query kitty via remote control
allow_remote_control yes
listen_on unix:/tmp/kitty

# Prevents "sudo: sorry, you are not allowed to set TERMINFO" when using kanata
shell_integration no-sudo

#############################################################################
#                              Font
#############################################################################

# MonoLisa Variable (paid) — falls back to MesloLGM Nerd Font if not installed
font_family      family="MonoLisa Variable" style=Regular
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        15

# Disable ligatures near the cursor so you can see what you're editing
# Options: always, never, cursor
disable_ligatures cursor

# MonoLisa OpenType features — all stylistic sets enabled
# Normal: ss01 ss03 ss04 ss05–ss18 zero
# Italic: ss01 ss02 (script variant) ss05–ss18 zero
# Docs: https://sw.kovidgoyal.net/kitty/conf/#opt-kitty.font_features
font_features MonoLisaVariable-Regular       +zero +ss01 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08 +ss09 +ss10 +ss11 +ss12 +ss13 +ss14 +ss15 +ss16 +ss17 +ss18
font_features MonoLisaVariableRegular-Bold   +zero +ss01 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08 +ss09 +ss10 +ss11 +ss12 +ss13 +ss14 +ss15 +ss16 +ss17 +ss18
font_features MonoLisaVariable-Italic        +zero +ss01 +ss02 +ss05 +ss06 +ss07 +ss08 +ss09 +ss10 +ss11 +ss12 +ss13 +ss14 +ss15 +ss16 +ss17 +ss18
font_features MonoLisaVariableItalic-Bold    +zero +ss01 +ss02 +ss05 +ss06 +ss07 +ss08 +ss09 +ss10 +ss11 +ss12 +ss13 +ss14 +ss15 +ss16 +ss17 +ss18

# Nerd Font fallback — map icon glyphs to Symbols Nerd Font Mono so eza,
# starship, and fzf-tab icons render regardless of primary font.
# Dedicated symbols-only font keeps MonoLisa as the primary for letters.
# Nerd Font Unicode ranges: https://github.com/ryanoasis/nerd-fonts/wiki/Glyph-Sets-and-Code-Points
symbol_map U+E000-U+E00A,U+EA60-U+EBEB,U+E0A0-U+E0C8,U+E0CA,U+E0CC-U+E0D7,U+E200-U+E2A9,U+E300-U+E3E3,U+E5FA-U+E6B5,U+E700-U+E7C5,U+ED00-U+EFC1,U+F000-U+F2FF,U+F300-U+F372,U+F400-U+F533,U+F0001-U+F1AF0 Symbols Nerd Font Mono

#############################################################################
#                              Cursor
#############################################################################

cursor_shape               beam
cursor_beam_thickness      1.5
cursor_blink_interval      0
cursor_stop_blinking_after 0

# Cursor trail — subtle animation that makes large jumps easy to follow
cursor_trail                 1
cursor_trail_decay           0.01 0.5
cursor_trail_start_threshold 0

#############################################################################
#                              Window
#############################################################################

# Hide titlebar but keep rounded corners
hide_window_decorations titlebar-only

window_padding_width 1 5 2 2

# Don't ask for confirmation when closing a window
confirm_os_window_close 0

# Transparency + blur — works with macOS compositor
background_opacity 0.85
background_blur    5

#############################################################################
#                              Scrollback
#############################################################################

scrollback_lines 10000

# Copy to clipboard on mouse select
copy_on_select yes

#############################################################################
#                              Bell
#############################################################################

enable_audio_bell no

#############################################################################
#                              macOS
#############################################################################

# Use right Option key as Alt (needed for terminal shortcuts)
macos_option_as_alt right

#############################################################################
#                              Tab bar
#############################################################################

tab_bar_edge     top
tab_bar_style    powerline
tab_bar_min_tabs 1

# Show the last directory name in the tab title
tab_title_template "{tab.active_wd.rsplit('/', 1)[-1]}"

# Don't let shell integration overwrite tab titles
shell_integration no-title

#############################################################################
#                              Key bindings
#############################################################################

# Use Cmd+Option as the kitty modifier
kitty_mod cmd+option

# Reload config
map ctrl+cmd+, load_config_file

# New window (pane) and navigation
map cmd+enter        new_window
map ctrl+shift+l     next_window
map ctrl+shift+h     previous_window

# Resize windows
map ctrl+cmd+option+h resize_window narrower
map ctrl+cmd+option+l resize_window wider
map ctrl+cmd+option+k resize_window taller
map ctrl+cmd+option+j resize_window shorter 3

# Close window
map kitty_mod+w close_window

# Layouts
map ctrl+cmd+option+u goto_layout tall
map ctrl+cmd+option+i goto_layout fat
map ctrl+cmd+option+o goto_layout stack

# Line navigation
# Cmd+Left/Right → Ctrl-A / Ctrl-E (zsh beginning-of-line / end-of-line).
# These respect embedded newlines in multiline buffers; `send_key home/end`
# relies on terminfo sequences that zsh often doesn't bind by default.
map cmd+left  send_text all \x01
map cmd+right send_text all \x05

# Opt+Left/Right → Meta-b / Meta-f (zsh backward-word / forward-word).
# Without this, kitty sends \e[1;3D/C which zsh doesn't bind, leaving ";3D"
# stuck in the buffer.
map opt+left  send_text all \eb
map opt+right send_text all \ef

# Delete entire line (Cmd+Backspace sends Ctrl+U)
map cmd+backspace send_text all \x15

# New tab
map cmd+t new_tab_with_cwd
