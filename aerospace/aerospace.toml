# ~/code/personal/my-shell-my-rules/aerospace/aerospace.toml
# AeroSpace window manager configuration
# Docs: https://nikitabobko.github.io/AeroSpace/guide

after-login-command = []
after-startup-command = []

# Notify sketchybar when workspace changes
exec-on-workspace-change = [
  '/bin/bash', '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]

start-at-login = true

# Normalizations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 0

# Possible values: tiles | accordion
default-root-container-layout = 'accordion'
default-root-container-orientation = 'auto'

key-mapping.preset = 'qwerty'

# Move mouse to window on focus change
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = ['move-mouse window-lazy-center']

# Gaps between windows
gaps.inner.horizontal = 10
gaps.inner.vertical = 10
gaps.outer.left = 0
gaps.outer.right = 0
gaps.outer.bottom = 0
gaps.outer.top = 10

############################################################################
#                         Key bindings
############################################################################

[mode.main.binding]

# Layout toggles
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# Focus — move focus between windows (vim-style)
cmd-shift-h = 'focus left'
cmd-shift-j = 'focus down'
cmd-shift-k = 'focus up'
cmd-shift-l = 'focus right'

# Fullscreen
cmd-shift-f = 'fullscreen'
ctrl-alt-enter = 'fullscreen'

# Toggle back and forth between last focused window
alt-o = 'focus-back-and-forth'

# Move windows
ctrl-alt-left = 'move left'
ctrl-alt-down = 'move down'
ctrl-alt-up = 'move up'
ctrl-alt-right = 'move right'

# Resize
alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'

# Workspaces — switch
alt-shift-cmd-ctrl-v = 'workspace 1'
alt-shift-cmd-ctrl-b = 'workspace 2'
alt-shift-cmd-ctrl-n = 'workspace 3'
alt-shift-cmd-ctrl-m = 'workspace 4'

# Tidy — move misplaced windows on current workspace to where they belong
alt-shift-cmd-ctrl-t = 'exec-and-forget bash ~/code/personal/my-shell-my-rules/aerospace/tidy-workspace.sh'

# Move window to next monitor
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# Enter service mode
alt-shift-semicolon = 'mode service'

############################################################################
#                         Service mode
############################################################################

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']       # reset layout
f = ['layout floating tiling', 'mode main']       # toggle floating
backspace = ['close-all-windows-but-current', 'mode main']

alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']

############################################################################
#                         Monitor → Workspace assignments
#
# Setup A — two external monitors:
#   Monitor 1 (main):      workspaces 1, 2  → dev work + terminal
#   Monitor 2 (secondary): workspaces 3, 4  → browsers + comms
#
# Setup B — laptop only:
#   All workspaces fall back to the built-in screen automatically
############################################################################

# Workspace 1 (comms):    Outlook + Slack + Safari (EA Window profile)
# Workspace 2 (general):  catch all — everything else lands here
# Workspace 3 (dev):      Kitty + VS Code + Figma
# Workspace 4 (private):  Safari (personal profile) + Obsidian
# Laptop only: everything falls back to built-in

[workspace-to-monitor-force-assignment]
'1' = ['main', 'built-in']
'2' = ['main', 'built-in']
'3' = ['secondary', 'main', 'built-in']
'4' = ['secondary', 'main', 'built-in']

############################################################################
#                         App workspace assignments
############################################################################

# Workspace 1 — comms
[[on-window-detected]]
if.app-name-regex-substring = 'Slack'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-name-regex-substring = 'Outlook'
run = 'move-node-to-workspace 1'

# Safari EA Window profile → workspace 1
[[on-window-detected]]
if.app-name-regex-substring = 'Safari'
if.window-title-regex-substring = 'EA Window'
run = 'move-node-to-workspace 1'

# Workspace 3 — dev
# NOTE: Kitty's size and position as a floating window must be set once manually.
#       AeroSpace will remember it after that.
[[on-window-detected]]
if.app-id = 'net.kovidgoyal.kitty'
run = ['layout floating', 'move-node-to-workspace 3']

[[on-window-detected]]
if.app-name-regex-substring = 'Visual Studio Code'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-name-regex-substring = 'Figma'
run = 'move-node-to-workspace 3'

# Workspace 4 — private
[[on-window-detected]]
if.app-name-regex-substring = 'Obsidian'
run = 'move-node-to-workspace 4'

# Safari Personal profile → workspace 4
[[on-window-detected]]
if.app-name-regex-substring = 'Safari'
if.window-title-regex-substring = 'Personal'
run = 'move-node-to-workspace 4'
